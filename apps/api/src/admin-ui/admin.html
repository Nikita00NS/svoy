<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>СВОЙ — Admin (Railway)</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#0b1020;color:#f3f4f6}a{color:#93c5fd;text-decoration:none}.container{max-width:1280px;margin:0 auto;padding:24px}.card{background:#111831;border:1px solid #26314f;border-radius:16px;padding:20px;margin-bottom:16px}.grid{display:grid;gap:16px}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.btn{background:#2563eb;color:#fff;border:0;padding:10px 14px;border-radius:12px;cursor:pointer}.btn.secondary{background:#334155}.btn:disabled{opacity:.6;cursor:not-allowed}.input,.select,.textarea{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff}.textarea{min-height:110px}.table{width:100%;border-collapse:collapse;font-size:14px}.table th,.table td{text-align:left;padding:10px;border-bottom:1px solid #23314f;vertical-align:top;word-break:break-word}.muted{color:#94a3b8}.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.tab{padding:10px 14px;border-radius:10px;background:#172036;border:1px solid #26314f;cursor:pointer}.tab.active{background:#2563eb;border-color:#2563eb}.badge{background:#1e293b;padding:2px 8px;border-radius:999px;font-size:12px}@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>СВОЙ — Панель владельца <span class="muted" style="font-size:14px">/admin (работает без Vercel)</span></h1>
<div id="authBox"></div>
<div id="app" style="display:none"></div>
</div>

<script>
const API = location.origin; // same origin, no CORS problems!

function api(path, opts={}){
  return fetch(API+path, {
    credentials:'include',
    headers:{'Content-Type':'application/json', ...(opts.headers||{})},
    ...opts
  }).then(async r=>{
    const t = await r.text();
    let j;
    try{ j=JSON.parse(t); }catch{ j={raw:t}; }
    if(!r.ok) throw new Error((j.message||j.error?.message||j.raw||'API error') + ' ['+r.status+']');
    if(j && j.success===false) throw new Error(j.error?.message||'API failed');
    return j.data ?? j;
  });
}

let me=null;
let data={dashboard:null,users:[],intakes:[],channels:[],bots:[],content:[],moderation:[],rss:[],audit:[]};
let tab='dashboard';
let filters={users:'',intake:'',content:''};
let forms={channel:{title:'',handle:'',telegramId:'',postWatermark:'СВОЙ'},bot:{username:'',tokenRef:'',webhookPath:'',internalKey:''},moderation:{chatId:'',targetTelegramId:'',messageId:'',action:'WARN',reason:''},rss:{title:'',url:''},schedule:{}};
let botLoginToken='';

function renderAuth(){
  const el=document.getElementById('authBox');
  if(me && me.authenticated){
    el.innerHTML = `<div class="card"><div class="row" style="justify-content:space-between"><div><b>Вошел как @${me.username||'owner'} · ${me.role} · ${me.telegramUserId}</b> <span class="badge">Railway mode</span></div><div class="row"><button class="btn secondary" onclick="setupWebhook()">Настроить webhook</button><button class="btn secondary" onclick="logout()">Выйти</button></div></div><div class="muted" style="margin-top:8px">Backend: ${API} | Vercel (svoyr.vercel.app) не нужен. Если бот не отвечает -> нажми Настроить webhook.</div></div>`;
    document.getElementById('app').style.display='block';
  } else {
    el.innerHTML = `
<div class="grid" style="max-width:720px">
  <div class="card">
    <h2>Вход по паролю (быстро)</h2>
    <p class="muted">Логин/пароль из Railway ENV: ADMIN_LOGIN / ADMIN_PASSWORD</p>
    <div class="grid" style="margin-top:12px">
      <input id="loginInput" class="input" placeholder="Логин" value="admin" />
      <input id="passInput" class="input" placeholder="Пароль" type="password" />
      <button class="btn" onclick="loginPwd()">Войти по паролю</button>
      <div id="pwdErr" style="color:#ff6b6b"></div>
    </div>
  </div>
  <div class="card">
    <h2>Вход через Telegram-бота @SVOIROBOT</h2>
    <p class="muted">Нажми -> бот пришлет кнопку ✅ Да, это я</p>
    <button class="btn secondary" id="botBtn" onclick="requestBot()">Войти через бота</button>
    <div id="botStatus" class="muted" style="margin-top:12px;white-space:pre-wrap"></div>
  </div>
  <div class="card" style="background:#111">
    <h3 style="margin:0">Что делать если Vercel нет доступа?</h3>
    <ul class="muted" style="line-height:1.6">
      <li>Ты уже на правильном месте: <b>${API}/admin</b> — админка прямо с бэкенда, Vercel не нужен.</li>
      <li>Поставь в Railway ENV <code>ADMIN_URL=${API}</code> чтобы CORS не мешал.</li>
      <li>Если хочешь вернуть Vercel — зайди в Vercel под тем GitHub аккаунтом где создавал <code>svoyr</code>, нажми Redeploy.</li>
      <li>Или создай новый проект в Vercel / Cloudflare Pages из папки apps/admin и укажи <code>NEXT_PUBLIC_API_URL=${API}</code></li>
      <li>Бот-модератор: добавь @SVOIROBOT админом в канал, потом создай канал в админке.</li>
    </ul>
  </div>
</div>`;
    document.getElementById('app').style.display='none';
  }
}

async function loginPwd(){
  const login=document.getElementById('loginInput').value.trim();
  const password=document.getElementById('passInput').value;
  const err=document.getElementById('pwdErr');
  err.textContent='Вхожу...';
  try{
    await api('/auth/login',{method:'POST',body:JSON.stringify({login,password})});
    location.reload();
  }catch(e){ err.textContent=e.message; }
}

async function requestBot(){
  const st=document.getElementById('botStatus');
  const btn=document.getElementById('botBtn');
  st.textContent='Отправляю запрос в Telegram...';
  btn.disabled=true;
  try{
    const res=await api('/auth/bot/request',{method:'POST'});
    botLoginToken=res.token;
    st.textContent='Я отправил сообщение в @SVOIROBOT. Открой бота и нажми «✅ Да, это я». Жду 10 минут...';
    const interval=setInterval(async()=>{
      try{
        const s=await api('/auth/bot/status/'+botLoginToken);
        if(s.approved){
          await api('/auth/bot/consume/'+botLoginToken,{method:'POST'});
          clearInterval(interval);
          st.textContent='✅ Подтверждено! Загружаю...';
          location.reload();
        }
        if(s.found===false){ clearInterval(interval); st.textContent='⏰ Токен истек, нажми еще раз.'; btn.disabled=false; }
      }catch(e){ clearInterval(interval); st.textContent='Ошибка: '+e.message; btn.disabled=false; }
    },2000);
  }catch(e){ st.textContent='Ошибка: '+e.message; btn.disabled=false; }
}

async function logout(){ await api('/auth/logout',{method:'POST'}); location.reload(); }
async function setupWebhook(){ try{ const r=await api('/admin/setup/master-bot',{method:'POST',body:JSON.stringify({})}); alert('Webhook OK: '+JSON.stringify(r)); }catch(e){ alert('Ошибка webhook: '+e.message); } }

function renderApp(){
  if(!me||!me.authenticated) return;
  const app=document.getElementById('app');
  const tabs=['dashboard','users','intakes','channels','bots','content','moderation','rss','audit'];
  const filteredUsers=data.users.filter(x=>!filters.users||`${x.username||''} ${x.telegramUserId}`.toLowerCase().includes(filters.users.toLowerCase()));
  const filteredIntakes=data.intakes.filter(x=>!filters.intake||`${x.type} ${x.text||''}`.toLowerCase().includes(filters.intake.toLowerCase()));
  const filteredContent=data.content.filter(x=>!filters.content||`${x.title||''} ${x.body||''} ${x.status||''}`.toLowerCase().includes(filters.content.toLowerCase()));
  app.innerHTML=`
<div class="tabs">${tabs.map(t=>`<button class="tab ${tab===t?'active':''}" onclick="switchTab('${t}')">${t}</button>`).join('')}</div>

${tab==='dashboard'?`<div class="grid grid-4">${Object.entries(data.dashboard||{}).map(([k,v])=>`<div class="card"><h3>${k}</h3><p>${String(v)}</p></div>`).join('')}</div>`:''}

${tab==='users'?`<div class="card"><div class="row" style="justify-content:space-between"><h2>Пользователи</h2><input class="input" style="max-width:320px" placeholder="Поиск" value="${filters.users}" oninput="setFilter('users',this.value)"/></div><table class="table"><thead><tr><th>Username</th><th>TG ID</th><th>Role</th><th>Active</th><th>Действия</th></tr></thead><tbody>${filteredUsers.map(i=>`<tr><td>${i.username||'—'}</td><td>${i.telegramUserId}</td><td>${i.role}</td><td>${i.isActive?'Да':'Нет'}</td><td><div class="row"><button class="btn secondary" onclick="patchUser('${i.id}','MODERATOR')">MOD</button><button class="btn secondary" onclick="patchUser('${i.id}','EDITOR')">ED</button><button class="btn secondary" onclick="patchUser('${i.id}','SUPPORT')">SUP</button><button class="btn secondary" onclick="delUser('${i.id}')">Del</button></div></td></tr>`).join('')}</tbody></table></div>`:''}

${tab==='intakes'?`<div class="card"><div class="row" style="justify-content:space-between"><h2>Заявки с бота</h2><input class="input" style="max-width:320px" placeholder="Фильтр" value="${filters.intake}" oninput="setFilter('intake',this.value)"/></div><table class="table"><thead><tr><th>Тип</th><th>Статус</th><th>Юзер</th><th>Текст</th><th>Медиа</th></tr></thead><tbody>${filteredIntakes.map(i=>`<tr><td>${i.type}</td><td>${i.status}</td><td>${i.user?.username||i.user?.telegramUserId||'—'}</td><td>${(i.text||'—').slice(0,200)}</td><td>${i.mediaType||'TEXT'}</td></tr>`).join('')}</tbody></table></div>`:''}

${tab==='channels'?`<div class="grid grid-2"><div class="card"><h2>Создать канал</h2><div class="grid"><input class="input" placeholder="Название" value="${forms.channel.title}" oninput="setForm('channel','title',this.value)"/><input class="input" placeholder="Handle @..." value="${forms.channel.handle}" oninput="setForm('channel','handle',this.value)"/><input class="input" placeholder="Telegram ID -100..." value="${forms.channel.telegramId}" oninput="setForm('channel','telegramId',this.value)"/><input class="input" placeholder="Watermark" value="${forms.channel.postWatermark}" oninput="setForm('channel','postWatermark',this.value)"/><button class="btn" onclick="createChannel()">Создать</button></div></div><div class="card"><h2>Каналы</h2><table class="table"><thead><tr><th>Название</th><th>Handle</th><th>ID</th><th>Watermark</th></tr></thead><tbody>${data.channels.map(i=>`<tr><td>${i.title}</td><td>${i.handle||'—'}</td><td>${i.telegramId||'—'}</td><td>${i.postWatermark||'—'}</td></tr>`).join('')}</tbody></table></div></div>`:''}

${tab==='bots'?`<div class="grid grid-2"><div class="card"><h2>Добавить бота</h2><div class="grid"><input class="input" placeholder="Username" value="${forms.bot.username}" oninput="setForm('bot','username',this.value)"/><input class="input" placeholder="tokenRef" value="${forms.bot.tokenRef}" oninput="setForm('bot','tokenRef',this.value)"/><input class="input" placeholder="webhook_path /telegram/webhook/xxx" value="${forms.bot.webhookPath}" oninput="setForm('bot','webhookPath',this.value)"/><input class="input" placeholder="internalKey" value="${forms.bot.internalKey}" oninput="setForm('bot','internalKey',this.value)"/><button class="btn" onclick="createBot()">Создать</button></div></div><div class="card"><h2>Боты</h2><table class="table"><thead><tr><th>Username</th><th>Webhook</th><th>Master</th></tr></thead><tbody>${data.bots.map(i=>`<tr><td>${i.username}</td><td>${i.webhookPath}</td><td>${i.isMaster?'Да':'Нет'}</td></tr>`).join('')}</tbody></table></div></div>`:''}

${tab==='content'?`<div class="card"><div class="row" style="justify-content:space-between"><h2>Контент (автописатель)</h2><input class="input" style="max-width:320px" placeholder="Фильтр" value="${filters.content}" oninput="setFilter('content',this.value)"/></div><table class="table"><thead><tr><th>Title</th><th>Status</th><th>Body</th><th>AI</th><th>Действия</th></tr></thead><tbody>${filteredContent.map(i=>`<tr><td>${i.title||'—'}</td><td>${i.status}</td><td>${(i.body||'').slice(0,120)}</td><td>${(i.aiRewrittenText||'').slice(0,120)}</td><td><div class="row"><button class="btn secondary" onclick="actContent('${i.id}','rewrite')">AI Rewrite</button><button class="btn secondary" onclick="actContent('${i.id}','approve')">Approve</button><button class="btn secondary" onclick="actContent('${i.id}','publish-now')">Publish now</button><button class="btn secondary" onclick="actContent('${i.id}','process-watermark')">Watermark</button><button class="btn secondary" onclick="delContent('${i.id}')">Delete</button><input class="input" style="width:180px" type="datetime-local" value="${forms.schedule[i.id]||''}" onchange="setSchedule('${i.id}',this.value)"/><button class="btn secondary" onclick="scheduleContent('${i.id}')">Schedule</button></div></td></tr>`).join('')}</tbody></table></div>`:''}

${tab==='moderation'?`<div class="grid grid-2"><div class="card"><h2>Модерация канала</h2><div class="grid"><input class="input" placeholder="Chat ID -100..." value="${forms.moderation.chatId}" oninput="setForm('moderation','chatId',this.value)"/><input class="input" placeholder="Target Telegram ID" value="${forms.moderation.targetTelegramId}" oninput="setForm('moderation','targetTelegramId',this.value)"/><input class="input" placeholder="Message ID" value="${forms.moderation.messageId}" oninput="setForm('moderation','messageId',this.value)"/><select class="select" value="${forms.moderation.action}" onchange="setForm('moderation','action',this.value)"><option>WARN</option><option>MUTE</option><option>BAN</option><option>DELETE</option></select><textarea class="textarea" placeholder="Причина" oninput="setForm('moderation','reason',this.value)">${forms.moderation.reason}</textarea><button class="btn" onclick="applyMod()">Применить</button><button class="btn secondary" onclick="escalateMod()">Escalate</button></div></div><div class="card"><h2>История</h2><table class="table"><thead><tr><th>Action</th><th>Target</th><th>Reason</th></tr></thead><tbody>${data.moderation.map(i=>`<tr><td>${i.action}</td><td>${i.targetTelegramId}</td><td>${i.reason||'—'}</td></tr>`).join('')}</tbody></table></div></div>`:''}

${tab==='rss'?`<div class="grid grid-2"><div class="card"><h2>RSS источник (автописатель новостей)</h2><div class="grid"><input class="input" placeholder="Название" value="${forms.rss.title}" oninput="setForm('rss','title',this.value)"/><input class="input" placeholder="URL https://..." value="${forms.rss.url}" oninput="setForm('rss','url',this.value)"/><button class="btn" onclick="createRss()">Добавить</button></div></div><div class="card"><h2>Источники</h2><table class="table"><thead><tr><th>Название</th><th>URL</th><th></th></tr></thead><tbody>${data.rss.map(i=>`<tr><td>${i.title}</td><td>${i.url}</td><td><button class="btn secondary" onclick="fetchRss('${i.id}')">Fetch</button></td></tr>`).join('')}</tbody></table></div></div>`:''}

${tab==='audit'?`<div class="card"><h2>Audit log</h2><table class="table"><thead><tr><th>Action</th><th>Entity</th><th>ID</th><th>When</th></tr></thead><tbody>${data.audit.map(i=>`<tr><td>${i.action}</td><td>${i.entityType}</td><td>${i.entityId||'—'}</td><td>${new Date(i.createdAt).toLocaleString('ru-RU')}</td></tr>`).join('')}</tbody></table></div>`:''}
`;
}

function switchTab(t){ tab=t; renderApp(); }
function setFilter(k,v){ filters[k]=v; renderApp(); }
function setForm(group,key,val){ forms[group][key]=val; }
function setSchedule(id,val){ forms.schedule[id]=val; }

async function loadAll(){
  try{
    const m=await api('/auth/me');
    me=m;
  }catch{ me={authenticated:false}; }
  renderAuth();
  if(!me.authenticated){ document.getElementById('app').innerHTML=''; return; }
  try{
    const [dashboard,users,intakes,channels,bots,content,moderation,rss,audit]=await Promise.all([
      api('/admin/dashboard'),
      api('/users?limit=50'),
      api('/admin/intakes?limit=50'),
      api('/channels'),
      api('/bots'),
      api('/content?limit=50'),
      api('/moderation'),
      api('/rss'),
      api('/audit?limit=50')
    ]);
    const unwrap=d=>Array.isArray(d)?d:(d.items||[]);
    data={dashboard,users:unwrap(users),intakes:unwrap(intakes),channels:Array.isArray(channels)?channels:channels.items||channels, bots:Array.isArray(bots)?bots:bots.items||bots, content:unwrap(content), moderation:Array.isArray(moderation)?moderation:moderation.items||moderation, rss:Array.isArray(rss)?rss:rss.items||rss, audit:unwrap(audit)};
    renderApp();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="card" style="color:#ff6b6b">Ошибка загрузки: '+e.message+'<br>Попробуй выйти и войти снова.</div>';
  }
}

async function submit(path,body,method='POST'){ await api(path,{method,body:JSON.stringify(body)}); await loadAll(); }
async function remove(path){ await api(path,{method:'DELETE'}); await loadAll(); }
async function patchUser(id,role){ await submit('/users/'+id,{role},'PATCH'); }
async function delUser(id){ if(confirm('Удалить?')) await remove('/users/'+id); }
async function createChannel(){ await submit('/channels',forms.channel); }
async function createBot(){ await submit('/bots',forms.bot); }
async function createRss(){ await submit('/rss',forms.rss); }
async function fetchRss(id){ await submit('/rss/'+id+'/fetch',{}); }
async function actContent(id,action){ await submit('/content/'+id+'/'+action,{}); }
async function delContent(id){ await remove('/content/'+id); }
async function scheduleContent(id){ const s=forms.schedule[id]; if(!s){ alert('Выбери дату'); return; } await submit('/content/'+id+'/schedule',{scheduledFor:s}); }
async function applyMod(){ const b={...forms.moderation,messageId:forms.moderation.messageId?Number(forms.moderation.messageId):undefined}; await submit('/moderation/apply',b); }
async function escalateMod(){ await submit('/moderation/escalate',{chatId:forms.moderation.chatId,targetTelegramId:forms.moderation.targetTelegramId,reason:forms.moderation.reason}); }

loadAll();
</script>
</body>
</html>
